<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>CALCULATOR</h1>
    <div id="container">
        <div id="outputPanel"></div>
        <div id="buttonsPanel">

            <div class="delKeysPanel">
                <button id="cls">Clear</button>
                <button id="backspace">⌫</button>
            </div>

            <div class="otherButtons">
                <div class="numberButtons">
                    <button id="one">1</button>
                    <button id="two">2</button>
                    <button id="three">3</button>
                    <button id="four">4</button>
                    <button id="five">5</button>
                    <button id="six">6</button>
                    <button id="seven">7</button>
                    <button id="eight">8</button>
                    <button id="nine">9</button>
                    <button id="zero">0</button>
                    <button id="decimal"><strong>.</strong></button>
                    <button id="enter"><strong>Enter</strong></button>
                </div>
                <div class="operators">
                    <button id="plus"><strong>+</strong></button>
                    <button id="minus"><strong>-</strong></button>
                    <button id="multiply"><strong>×</strong></button>
                    <button id="divide"><strong>÷</strong></button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
